<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8d5a3;
    --accent2: #c8a96e;
    --text: #e8e8e8;
    --muted: #666;
    --red: #cc4444;
    --green: #4a9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .logo h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    color: var(--accent);
    line-height: 1;
  }

  .logo span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .vigencia {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
  }

  .vigencia strong {
    display: block;
    color: var(--accent);
    font-size: 0.85rem;
  }

  /* MAIN */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  .intro {
    margin-bottom: 40px;
  }

  .intro h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .intro p {
    font-size: 0.85rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* FORM */
  .search-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
  }

  .field select, .field input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
    cursor: pointer;
    width: 100%;
  }

  .field select:focus, .field input:focus {
    border-color: var(--accent2);
  }

  .field select option {
    background: #1a1a1a;
  }

  .select-wrap {
    position: relative;
  }

  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent2);
    pointer-events: none;
    font-size: 0.8rem;
  }

  .btn-buscar {
    width: 100%;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    padding: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .btn-buscar:hover { background: var(--accent2); }
  .btn-buscar:active { transform: scale(0.99); }

  .btn-limpiar {
    width: 100%;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: color 0.2s, border-color 0.2s;
  }

  .btn-limpiar:hover { color: var(--text); border-color: var(--muted); }

  /* RESULTS */
  #resultado {
    margin-top: 40px;
  }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .result-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .result-count strong {
    color: var(--accent);
    font-size: 1rem;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 16px;
    overflow: hidden;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-head {
    padding: 16px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .card-title {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .card-modelo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .card-marca {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
  }

  .card-tipo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent2);
    background: rgba(200, 169, 110, 0.1);
    padding: 3px 8px;
    letter-spacing: 1px;
    white-space: nowrap;
    align-self: flex-start;
  }

  .card-body {
    padding: 16px 20px;
  }

  /* PRICE TABLE */
  .price-table {
    width: 100%;
    border-collapse: collapse;
  }

  .price-table th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    text-align: left;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }

  .price-table td {
    padding: 8px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    border-bottom: 1px solid var(--border);
  }

  .price-table tr:last-child td { border-bottom: none; }

  .price-table td.anio {
    color: var(--muted);
    font-size: 0.75rem;
  }

  .price-table td.precio {
    color: var(--text);
    font-weight: 500;
  }

  .price-table td.precio span {
    font-size: 0.65rem;
    color: var(--muted);
    margin-right: 2px;
  }

  .price-table tr.highlighted td {
    background: rgba(232, 213, 163, 0.06);
  }

  .price-table tr.highlighted td.anio {
    color: var(--accent);
  }

  .price-table tr.highlighted td.precio {
    color: var(--accent);
    font-size: 0.9rem;
  }

  /* price grid layout for many years */
  .prices-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
  }

  .price-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .price-chip.highlight {
    border-color: var(--accent2);
    background: rgba(232, 213, 163, 0.05);
  }

  .price-chip .chip-anio {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .price-chip.highlight .chip-anio {
    color: var(--accent);
  }

  .price-chip .chip-valor {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--text);
    font-weight: 500;
  }

  .price-chip.highlight .chip-valor {
    color: var(--accent);
    font-size: 0.95rem;
  }

  .chip-currency {
    font-size: 0.65rem;
    color: var(--muted);
  }

  /* NO RESULTS */
  .no-result {
    text-align: center;
    padding: 60px 20px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    font-size: 0.85rem;
    border: 1px dashed var(--border);
  }

  .no-result span {
    display: block;
    font-size: 2rem;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 20px 40px;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  @media (max-width: 600px) {
    header { padding: 16px 20px; flex-direction: column; gap: 12px; align-items: flex-start; }
    main { padding: 24px 16px; }
    .search-grid { grid-template-columns: 1fr; }
    .prices-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

const getAnios = () => {

};

function updateModelos() {
  const m = selMarca.value;
  selModelo.innerHTML = '<option value="">— Seleccionar —</option>';
  selTipo.innerHTML = '<option value="">— Seleccionar —</option>';
  selModelo.disabled = !m;
  selTipo.disabled = true;
  if (m) {
    getModelos(m).forEach(mod => {
      const o = document.createElement('option');
      o.value = mod; o.textContent = mod;
      selModelo.appendChild(o);
    });
  }
}

function updateTipos() {
  const m = selMarca.value;
  const mod = selModelo.value;
  selTipo.innerHTML = '<option value="">— Todos los tipos —</option>';
  selTipo.disabled = false;
  if (m && mod) {
    getTipos(m, mod).forEach(t => {
      const o = document.createElement('option');
      o.value = t; o.textContent = t;
      selTipo.appendChild(o);
    });
  }
}

function fmt(n) {
  return new Intl.NumberFormat('es-AR', {maximumFractionDigits: 0}).format(n);
}

function buscar() {
  const m = selMarca.value;
  const mod = selModelo.value;
  const tipo = selTipo.value;
  const anio = selAnio.value;
  const div = document.getElementById('resultado');

  let results = DATA.filter(d => {
    if (m && d.marca !== m) return false;
    if (mod && d.modelo !== mod) return false;
    if (tipo && d.tipo !== tipo) return false;
    return true;
  });

  if (!m && !mod) {
    div.innerHTML = '<div class="no-result"><span>🔍</span>Seleccioná al menos una Marca para buscar.</div>';
    return;
  }

  if (results.length === 0) {
    div.innerHTML = '<div class="no-result"><span>—</span>Sin resultados para la búsqueda.</div>';
    return;
  }

  let html = `<div class="result-header">
    <div class="result-count"><strong>${results.length}</strong> resultado${results.length > 1 ? 's' : ''} encontrado${results.length > 1 ? 's' : ''}</div>
    ${anio ? `<div class="result-count">Filtrando por año: <strong style="color:var(--accent)">${anio === '0Km' ? '0 Km' : anio}</strong></div>` : ''}
  </div>`;

  results.forEach((r, idx) => {
    const precios = r.precios;
    const aniosDisp = Object.keys(precios);

    // If year filter active, show only if that year exists
    if (anio && !precios[anio]) return;

    html += `<div class="card" style="animation-delay: ${idx * 0.05}s">
      <div class="card-head">
        <div class="card-title">
          <div class="card-modelo">${r.modelo}</div>
          <div class="card-marca">${r.marca}</div>
        </div>
        <div class="card-tipo">${r.tipo}</div>
      </div>
      <div class="card-body">`;

    if (anio) {
      // Single year highlight
      const val = precios[anio];
      const pat = anio !== '0Km' ? getPatente(r.marca, r.modelo, anio) : null;
      html += `<div style="padding:8px 0; font-family:'IBM Plex Mono',monospace;">
        <div style="font-size:0.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">Valor ${anio === '0Km' ? '0 Km (nuevo)' : anio}</div>
        <div style="font-size:2rem;color:var(--accent);letter-spacing:1px;"><span style="font-size:0.9rem;color:var(--muted);margin-right:4px;">$</span>${fmt(val)}</div>
        ${pat ? `<div style="margin-top:6px;font-size:0.72rem;color:var(--muted);">Patente bimestral CABA: <span style="color:var(--accent);font-weight:600;">$${fmt(pat)}</span></div>` : ''}
      </div>`;
    } else {
      // All years as chips
      html += `<div class="prices-grid">`;
      ['0Km', ...Object.keys(precios).filter(k => k !== '0Km').map(Number).sort((a,b) => b-a).map(String)].forEach(a => {
        if (!precios[a]) return;
        const pat = a !== '0Km' ? getPatente(r.marca, r.modelo, a) : null;
        html += `<div class="price-chip">
          <div class="chip-anio">${a === '0Km' ? '0 Km' : a}</div>
          <div class="chip-valor"><span class="chip-currency">$ </span>${fmt(precios[a])}</div>
          ${pat ? `<div style="font-size:0.6rem;color:var(--muted);margin-top:3px;">Pat: <span style="color:var(--accent);">$${fmt(pat)}</span></div>` : ''}
        </div>`;
      });
      html += `</div>`;
    }

    html += `</div></div>`;
  });

  div.innerHTML = html;
}

function limpiar() {
  selMarca.value = '';
  selModelo.innerHTML = '<option value="">— Seleccionar —</option>';
  selModelo.disabled = true;
  selTipo.innerHTML = '<option value="">— Seleccionar —</option>';
  selTipo.disabled = true;
  selAnio.value = '';
  document.getElementById('resultado').innerHTML = '';
}
</script>
